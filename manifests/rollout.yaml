apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/cristianslazar/ci_cd_lab@sha256:f94da2068edcd1f970ceaf449553f27b7958260b5b1a4719d4c768ff275f7c79
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
